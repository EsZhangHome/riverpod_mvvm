name: riverpod_mvvm_demo
description: Riverpod MVVM enterprise starter learning application.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

# 依赖方向只能是 demo_app -> 企业底座。
# 根项目 pubspec 不声明 demo_app，因此正式工程不会解析或注册 Demo 的依赖。
dependencies:
  flutter:
    sdk: flutter
  riverpod_mvvm:
    path: ../..
  dio: ^5.9.2
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  json_annotation: ^4.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_secure_storage: ^10.3.1
  json_serializable: ^6.14.0
  shared_preferences: ^2.5.5

flutter:
  uses-material-design: true
