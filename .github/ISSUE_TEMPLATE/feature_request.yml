name: 功能建议
description: 从真实业务场景出发提出功能或底座能力建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: scenario
    attributes:
      label: 业务场景
      description: 谁在什么情况下遇到了什么问题？不要只写希望增加的库或 API。
      placeholder: 当用户在弱网下连续提交订单时……
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: 期望结果
      description: 描述用户能够完成什么，而不是限定具体实现。
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 为什么属于通用底座
      description: 哪些不同类型的企业项目都会使用？如果只属于一个业务 Feature，也请明确说明。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 说明现有 Provider、Repository、Service 或项目组合层为什么不能满足。

  - type: checkboxes
    id: boundaries
    attributes:
      label: 边界确认
      options:
        - label: 该建议不是为了展示技术或增加无业务消费者的抽象
          required: true
        - label: 我已考虑 Demo、Starter 和正式底座之间的删除边界
          required: true
