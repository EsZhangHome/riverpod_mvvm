name: Bug 报告
description: 报告可复现的崩溃、白屏、状态异常或平台差异
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请删除日志中的 Token、账号、手机号、接口 Body 和其他个人信息。
        安全漏洞不要填写此表单，请使用仓库的 Security Advisory。

  - type: input
    id: revision
    attributes:
      label: 版本或 Commit
      description: 例如 1.0.0+1、main@5befb4d。
      placeholder: main@abcdef0
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Flutter、设备与系统
      description: 请同时提供 Flutter 版本、设备/模拟器、Android/iOS 版本。
      placeholder: Flutter 3.44.0 / iPhone 16 Simulator / iOS 18
    validations:
      required: true

  - type: dropdown
    id: build_mode
    attributes:
      label: 构建模式
      options:
        - Debug
        - Profile
        - Release
        - 不确定
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 使用 development 配置启动 App
        2. 输入……
        3. 点击……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 已脱敏日志、截图或录屏
      description: 请确认内容不包含凭据、个人信息、生产地址和完整请求数据。

  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交确认
      options:
        - label: 我已使用最新 main 或最新发布版本复现
          required: true
        - label: 我已删除日志和截图中的敏感信息
          required: true
