name: Release Example (Manual)

# 这是可直接改造的发布示例，不监听 push 或 tag，因此不会自动发包。
# 第一次使用前必须阅读 docs/release_workflow.md，并在 GitHub Environment 中保护 production。
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "发布 Tag，必须与 pubspec 版本一致，例如 v1.0.0"
        required: true
        type: string
      dart_define_file:
        description: "仓库内生产配置文件路径；模板配置只能验证构建，禁止发布"
        required: true
        default: "config/production.example.json"
        type: string
      publish_github_release:
        description: "构建成功后创建/更新 GitHub Release"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "将 GitHub Release 标记为预发布"
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Verify and build signed Android artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      CONFIG_FILE: ${{ inputs.dart_define_file }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Validate release inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "release_tag must look like v1.2.3, got: ${RELEASE_TAG}"
            exit 1
          fi
          case "${CONFIG_FILE}" in
            config/*.json) ;;
            *)
              echo "dart_define_file must be a JSON file under config/: ${CONFIG_FILE}"
              exit 1
              ;;
          esac
          if [[ ! -f "${CONFIG_FILE}" ]]; then
            echo "Configuration file does not exist: ${CONFIG_FILE}"
            exit 1
          fi
          PACKAGE_VERSION="$(awk '/^version:/ {print $2; exit}' pubspec.yaml)"
          VERSION_NAME="${PACKAGE_VERSION%%+*}"
          if [[ "${RELEASE_TAG}" != "v${VERSION_NAME}" ]]; then
            echo "Tag ${RELEASE_TAG} does not match pubspec version ${PACKAGE_VERSION}."
            exit 1
          fi
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required GitHub Secret: ${name}"
              exit 1
            fi
          done

      - name: Restore dependencies
        run: flutter pub get

      - name: Verify localization
        run: |
          flutter gen-l10n
          dart run tool/check_l10n.dart
          git diff --exit-code -- lib/l10n l10n_untranslated.json

      - name: Verify source and generated code
        run: |
          dart format --output=none --set-exit-if-changed lib test integration_test tool
          dart run build_runner build
          git diff --exit-code
          flutter analyze
          flutter test --coverage
          dart run tool/check_coverage.dart --minimum 70

      - name: Prepare Android signing
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android/keystore
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/keystore/upload-keystore.jks
          {
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "storeFile=../keystore/upload-keystore.jks"
          } > android/key.properties

      - name: Build signed APK and App Bundle
        run: |
          flutter build apk --release --dart-define-from-file="${CONFIG_FILE}"
          flutter build appbundle --release --dart-define-from-file="${CONFIG_FILE}"

      - name: Validate and collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          APK="build/app/outputs/flutter-apk/app-release.apk"
          AAB="build/app/outputs/bundle/release/app-release.aab"
          for artifact in "${APK}" "${AAB}"; do
            if [[ ! -f "${artifact}" ]]; then
              echo "Expected release artifact is missing: ${artifact}"
              exit 1
            fi
            size="$(stat -c%s "${artifact}")"
            if [[ "${size}" -lt 1048576 ]]; then
              echo "Artifact is unexpectedly small (${size} bytes): ${artifact}"
              exit 1
            fi
            unzip -tq "${artifact}" >/dev/null
          done
          VERSION_NAME="${RELEASE_TAG#v}"
          mkdir -p dist
          cp "${APK}" "dist/app-${VERSION_NAME}-release.apk"
          cp "${AAB}" "dist/app-${VERSION_NAME}-release.aab"
          cd dist
          sha256sum ./* > SHA256SUMS.txt
          ls -lh

      - name: Upload verified artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-${{ inputs.release_tag }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

  publish-github-release:
    name: Publish GitHub Release
    needs: build-android
    if: ${{ inputs.publish_github_release }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      CONFIG_FILE: ${{ inputs.dart_define_file }}
      IS_PRERELEASE: ${{ inputs.prerelease }}

    steps:
      - name: Reject template or development configuration
        shell: bash
        run: |
          set -euo pipefail
          case "${CONFIG_FILE}" in
            *.example.json|config/development.json)
              echo "Refusing to publish an artifact built with template/development configuration: ${CONFIG_FILE}"
              exit 1
              ;;
          esac

      - name: Download verified artifacts
        uses: actions/download-artifact@v8
        with:
          name: android-${{ inputs.release_tag }}
          path: dist

      - name: Create or update release
        shell: bash
        run: |
          set -euo pipefail
          prerelease_args=()
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            prerelease_args+=(--prerelease)
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --target "${GITHUB_SHA}" \
              --generate-notes \
              "${prerelease_args[@]}"
          fi
