name: Flutter CI

on:
  push:
  pull_request:

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true
      - run: flutter pub get
      # 开发模式会阻断未登记 SDK、权限和明确敏感标识调用；隐私政策等真实项目信息
      # 在底座阶段只提示，客户发布流水线应再对 Release APK 执行 release 模式。
      - name: Audit privacy compliance
        run: dart run tool/privacy/privacy_audit.dart --mode development
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test tool
      - name: Verify generated code
        run: |
          dart run build_runner build
          git diff --exit-code
      - run: flutter analyze
      - run: flutter test --coverage
      - name: Enforce coverage floor
        run: dart run tool/check_coverage.dart --minimum 70
      - name: Build debug APK
        run: flutter build apk --debug --dart-define-from-file=config/development.json

  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: examples/demo_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        # checkout 后再检测目录；Demo 被删除时后续步骤全部跳过。
        if: ${{ hashFiles('examples/demo_app/pubspec.yaml') != '' }}
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true
      - run: flutter pub get
        if: ${{ hashFiles('examples/demo_app/pubspec.yaml') != '' }}
      - name: Verify Demo formatting
        if: ${{ hashFiles('examples/demo_app/pubspec.yaml') != '' }}
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Verify Demo generated code
        if: ${{ hashFiles('examples/demo_app/pubspec.yaml') != '' }}
        run: |
          dart run build_runner build
          git diff --exit-code -- lib
      - run: flutter analyze
        if: ${{ hashFiles('examples/demo_app/pubspec.yaml') != '' }}
      - run: flutter test
        if: ${{ hashFiles('examples/demo_app/pubspec.yaml') != '' }}

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true
      - run: flutter pub get
      # 集成测试必须运行在真实 Flutter Engine/设备上。Android 模拟器只承载 App，
      # 业务流程中的 Repository、SessionStore 和连接状态仍由测试替换，不依赖外部
      # 后端或测试账号；基础设施冒烟用例会真实验证 SQLite 与安全存储平台通道。
      - name: Run app flow integration tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_2
          script: flutter test integration_test -d emulator-5554 --dart-define-from-file=config/development.json
